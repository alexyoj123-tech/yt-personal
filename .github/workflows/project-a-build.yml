name: project-a · build diario (ReVanced)
# Cron diario 06:00 UTC. Corre el pipeline completo y publica Release si
# hay cambios. Ver .github/actions/revanced-build/action.yml para el detalle.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: project-a-build
  cancel-in-progress: false

jobs:
  build:
    name: Pipeline ReVanced (YT + YTM + GmsCore)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar pipeline
        uses: ./.github/actions/revanced-build
        with:
          android_keystore_base64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          android_keystore_password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          android_key_alias:         ${{ secrets.ANDROID_KEY_ALIAS }}
          android_key_password:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          gh_token:                  ${{ secrets.GITHUB_TOKEN }}
