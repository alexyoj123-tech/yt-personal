name: project-a · build manual (ReVanced)
# Disparo manual con parámetros: versión específica, no publicar, forzar, etc.
# Útil para debugging cuando el cron diario falla.

on:
  workflow_dispatch:
    inputs:
      youtube_version:
        description: 'Versión de YouTube a parchear (vacío = la más alta compatible)'
        required: false
        type: string
        default: ''
      ytmusic_version:
        description: 'Versión de YT Music a parchear (vacío = la más alta compatible)'
        required: false
        type: string
        default: ''
      publish_release:
        description: '¿Publicar Release?'
        required: false
        type: boolean
        default: true
      force_release:
        description: '¿Forzar publicación aunque no haya cambios?'
        required: false
        type: boolean
        default: false
      apkeep_source:
        description: 'Fuente apkeep (solo apk-pure es viable sin credenciales para YT/YTM)'
        required: false
        type: choice
        default: apk-pure
        options: [apk-pure, google-play, f-droid, huawei-app-gallery]

permissions:
  contents: write

concurrency:
  group: project-a-manual
  cancel-in-progress: false

jobs:
  build:
    name: Pipeline manual (${{ inputs.youtube_version || 'auto' }}/${{ inputs.ytmusic_version || 'auto' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ejecutar pipeline
        uses: ./.github/actions/revanced-build
        with:
          youtube_version:           ${{ inputs.youtube_version }}
          ytmusic_version:           ${{ inputs.ytmusic_version }}
          publish_release:           ${{ inputs.publish_release }}
          force_release:             ${{ inputs.force_release }}
          apkeep_source:             ${{ inputs.apkeep_source }}
          android_keystore_base64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          android_keystore_password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          android_key_alias:         ${{ secrets.ANDROID_KEY_ALIAS }}
          android_key_password:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          gh_token:                  ${{ secrets.GITHUB_TOKEN }}
