name: pages-deploy · GitHub Pages from /docs

# Despliega la landing page (docs/index.html + obtainium-*.json) a
# GitHub Pages cada vez que cambia algo en docs/. Usa el método moderno
# (Pages built-in deploy via actions/deploy-pages) — no necesita branch
# gh-pages dedicado, sirve directamente del workspace.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Deploy /docs to Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload /docs as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
