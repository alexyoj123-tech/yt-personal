<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d1b2a">
  <meta name="robots" content="noindex, nofollow">
  <title>InvictusBlue · Golem</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230d1b2a'/%3E%3Cpath d='M30 25h12l8 30 8-30h12l-14 50h-12z' fill='%23d4af37'/%3E%3C/svg%3E">

  <style>
    :root {
      --bg-deep:    #08111a;
      --bg-card:    #0d1b2a;
      --bg-card-hi: #142838;
      --gold:       #d4af37;
      --gold-soft:  #b8951f;
      --text:       #f5f3e8;
      --text-dim:   #9aa3ad;
      --border:     #1d2f3f;
      --danger:     #c2434f;
      --success:    #4ea870;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(ellipse at top, #15263a 0%, var(--bg-deep) 60%);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
      display: flex; flex-direction: column; align-items: center;
    }
    main { width: 100%; max-width: 540px; }

    header { text-align: center; margin-bottom: 2.5rem; }
    .logo {
      display: inline-block;
      width: 84px; height: 84px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--bg-card-hi), var(--bg-card));
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: "Georgia", serif; font-size: 2.4rem;
      color: var(--gold); font-weight: 700;
      box-shadow: 0 4px 18px rgba(212, 175, 55, 0.18);
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.55rem; font-weight: 700; letter-spacing: .04em;
      color: var(--gold);
    }
    .tagline { color: var(--text-dim); font-size: .92rem; margin-top: .35rem; letter-spacing: .12em; text-transform: uppercase; }

    .meta {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem;
    }
    .meta-label { color: var(--text-dim); font-size: .82rem; text-transform: uppercase; letter-spacing: .08em; }
    .meta-value { color: var(--gold); font-size: 1.4rem; font-weight: 600; line-height: 1; }
    .meta-value.expired { color: var(--danger); }
    .meta-value.warn    { color: #e8b349; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      transition: border-color .2s ease;
    }
    .card:hover { border-color: var(--gold-soft); }
    .card-title {
      font-size: 1.1rem; font-weight: 600; color: var(--gold);
      margin-bottom: .15rem;
      display: flex; align-items: center; gap: .6rem;
    }
    .card-id {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: .72rem; color: var(--text-dim);
      word-break: break-all; margin: .5rem 0 .9rem;
      padding: .55rem .7rem;
      background: var(--bg-deep); border-radius: 6px;
      border: 1px solid var(--border);
    }
    .card-meta { color: var(--text-dim); font-size: .82rem; margin-bottom: .85rem; }

    .btn {
      display: block; width: 100%;
      padding: .85rem 1rem;
      font-size: .98rem; font-weight: 600;
      text-align: center; text-decoration: none;
      color: var(--bg-deep); background: var(--gold);
      border: 0; border-radius: 8px; cursor: pointer;
      transition: background .15s ease, transform .05s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover, .btn:focus { background: var(--gold-soft); }
    .btn:active { transform: scale(.985); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn.secondary {
      background: transparent; color: var(--gold);
      border: 1px solid var(--gold-soft); font-weight: 500;
    }
    .btn.secondary:hover { background: var(--bg-card-hi); }

    .actions { display: flex; flex-direction: column; gap: .55rem; margin-top: 2rem; }

    .expired-msg {
      background: var(--bg-card);
      border: 1px solid var(--danger);
      border-radius: 12px;
      padding: 1.5rem; text-align: center;
      color: var(--danger); font-size: 1.05rem;
      margin-bottom: 1.25rem;
    }

    footer {
      margin-top: 2.5rem;
      font-size: .76rem; color: var(--text-dim);
      text-align: center; max-width: 540px; padding: 0 .5rem;
      letter-spacing: .04em;
    }
    footer p { margin: .35rem 0; }

    .toast {
      position: fixed; left: 50%; bottom: 1.5rem;
      transform: translateX(-50%) translateY(2rem);
      background: var(--gold); color: var(--bg-deep);
      padding: .65rem 1.1rem; border-radius: 999px;
      font-size: .9rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .loading { text-align: center; color: var(--text-dim); font-size: .92rem; padding: 2rem; }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="logo">IB</div>
      <h1>InvictusBlue · Golem</h1>
      <p class="tagline">Distribución controlada</p>
    </header>

    <div id="content">
      <div class="loading">Cargando último build...</div>
    </div>

    <div class="actions">
      <a id="regenerate-btn" class="btn secondary"
         href="https://github.com/alexyoj123-tech/yt-personal/actions/workflows/project-f-family-build.yml"
         target="_blank" rel="noopener">🔄 Regenerar links ahora (GitHub Actions)</a>
    </div>
  </main>

  <footer>
    <p>Generado por InvictusBlue · Golem</p>
    <p>Página interna — no compartir</p>
  </footer>

  <div class="toast" role="status" aria-live="polite"></div>

  <script>
    const toast = document.querySelector(".toast");
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toast._t);
      toast._t = setTimeout(() => toast.classList.remove("show"), 2500);
    }

    async function loadManifest() {
      // Same-origin fetch — el workflow committee este archivo a docs/
      // en cada run para evitar CORS de release-assets.githubusercontent.com.
      const res = await fetch("./family-manifest.json", { cache: "no-store" });
      if (!res.ok) throw new Error(`manifest fetch failed: ${res.status}`);
      return await res.json();
    }

    function daysBetween(d1, d2) {
      const ms = d2.getTime() - d1.getTime();
      return Math.floor(ms / (1000 * 60 * 60 * 24));
    }

    function renderExpired() {
      const c = document.getElementById("content");
      c.innerHTML = `
        <div class="expired-msg">
          Versión expirada, adquiere la nueva versión, un gusto atenderte.
        </div>
      `;
    }

    function renderRelease(manifest) {
      const today = new Date();
      const expires = new Date(manifest.expires_date);
      const daysLeft = daysBetween(today, expires);

      if (daysLeft < 0) {
        renderExpired();
        return;
      }

      const c = document.getElementById("content");
      const expiresClass = daysLeft <= 7 ? "warn" : (daysLeft <= 30 ? "warn" : "");

      const cardHtml = (key, label) => {
        const a = manifest.apps[key];
        if (!a) return "";
        const sizeMB = (a.size_bytes / 1048576).toFixed(1);
        return `
          <section class="card">
            <h2 class="card-title">${label}</h2>
            <div class="card-meta">${sizeMB} MB · build ${manifest.build_date}</div>
            <div class="card-id">${a.url}</div>
            <button class="btn" data-copy="${a.url}">📋 Copiar link</button>
          </section>
        `;
      };

      c.innerHTML = `
        <div class="meta">
          <div>
            <div class="meta-label">Días restantes</div>
            <div style="font-size:.78rem; color:var(--text-dim); margin-top:.15rem;">expira ${manifest.expires_date}</div>
          </div>
          <div class="meta-value ${expiresClass}">${daysLeft}</div>
        </div>
        ${cardHtml("yt", "App 1")}
        ${cardHtml("ytm", "App 2")}
      `;

      c.querySelectorAll("button[data-copy]").forEach(btn => {
        btn.addEventListener("click", () => {
          const url = btn.dataset.copy;
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(url).then(
              () => showToast("Link copiado"),
              () => window.prompt("Copiá este link:", url)
            );
          } else {
            window.prompt("Copiá este link:", url);
          }
        });
      });
    }

    (async () => {
      try {
        const manifest = await loadManifest();
        renderRelease(manifest);
      } catch (e) {
        document.getElementById("content").innerHTML =
          `<div class="expired-msg">Error cargando build: ${e.message}<br><br>Tocá <b>Regenerar</b> abajo para crear/actualizar el manifest.</div>`;
      }
    })();
  </script>
</body>
</html>
