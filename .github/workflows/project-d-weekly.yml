name: project-d · YouTube Origin (TV Box) weekly check
# Upstream energylove/originproject publica ~bimensualmente; chequeo
# semanal (domingo) es margen suficiente sin spam a GitLab.
# Si hay versión nueva, crea un release con tag ytp-d-origin-<version>.
# Si el tag ya existe, skip (idempotente).

on:
  schedule:
    - cron: '0 4 * * 0'   # domingos 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: project-d-origin
  cancel-in-progress: false

jobs:
  build:
    name: Fetch + publish YouTube Origin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar deps (unrar + jq + aapt)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends unrar jq aapt

      - name: Fetch Origin desde GitLab
        run: bash project-d/scripts/fetch-origin.sh

      - name: Inspeccionar APK con aapt (informativo, no falla build)
        run: |
          APK=$(ls project-d/build/out/youtube-origin-*.apk | head -1)
          echo "=== aapt dump badging ==="
          aapt dump badging "$APK" | grep -E "^(package|application-label:|application-icon-160|native-code)" | head -8

      - name: Crear release si no existe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VER=$(jq -r '.version_clean' project-d/build/meta/fetch.json)
          TAG="ytp-d-origin-${VER}"
          APK=$(ls project-d/build/out/youtube-origin-*.apk | head -1)
          SHA=$(jq -r '.apk_sha256' project-d/build/meta/fetch.json)
          SOURCE=$(jq -r '.rar_source' project-d/build/meta/fetch.json)

          echo "VERSION: $VER | TAG: $TAG | APK: $APK"

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG ya existe — skip (idempotente)."
            exit 0
          fi

          echo "Creando release $TAG ..."
          BODY_FILE=$(mktemp)
          printf '# YouTube Origin %s (Google TV / Android TV)\n\nYouTube para Android TV con uBlock Origin + SponsorBlock inyectados, UI oficial y Widevine DRM intactos.\n\n**Arquitectura:** arm64-v8a — Google TV, Fire TV, Android TV Box (Android 9+)\n\n## Firma\nAPK con firma original de energylove (NO re-firmado). Re-firmar rompe Widevine DRM.\n\n## Integridad\nSHA-256: `%s`\n\n## Fuente\nUpstream: %s\nMantenedor: [energylove](https://gitlab.com/energylove)\n' "$VER" "$SHA" "$SOURCE" > "$BODY_FILE"

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "YouTube Origin $VER (Google TV / Android TV)" \
            --notes-file "$BODY_FILE" \
            "$APK" && echo "Release $TAG creado OK." || { echo "ERROR creando release"; cat "$BODY_FILE"; exit 1; }
          rm -f "$BODY_FILE"

      - name: Upload meta como artifact (siempre)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: project-d-meta-${{ github.run_id }}
          path: project-d/build/meta/
          retention-days: 30
          if-no-files-found: ignore
